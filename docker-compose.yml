version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zavrsi-mi-db
    environment:
      POSTGRES_USER: zavrsi
      POSTGRES_PASSWORD: zavrsi_secret
      POSTGRES_DB: zavrsi_mi
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./server/migrations/002_subcategories.sql:/docker-entrypoint-initdb.d/002_subcategories.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zavrsi -d zavrsi_mi']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zavrsi-mi-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
